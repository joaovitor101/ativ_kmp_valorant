openapi: 3.0.3
info:
  title: API Valorant - Agents & Abilities
  description: API para gerenciamento de agentes e habilidades
  version: 2.0.0

servers:
  - url: http://localhost:8080
    description: Servidor de Desenvolvimento

tags:
  - name: Agents
    description: Gerenciamento de agentes
  - name: Abilities
    description: Gerenciamento de habilidades

paths:

  /agents:
    get:
      tags: [Agents]
      summary: Listar todos os agentes
      responses:
        '200':
          description: Lista de agentes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'

    post:
      tags: [Agents]
      summary: Criar um agente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
      responses:
        '201':
          description: Agente criado

  /agents/{id}:
    get:
      tags: [Agents]
      summary: Buscar agente por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Agente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          description: Não encontrado

    put:
      tags: [Agents]
      summary: Atualizar agente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
      responses:
        '200':
          description: Atualizado
        '404':
          description: Não encontrado

    delete:
      tags: [Agents]
      summary: Deletar agente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deletado
        '404':
          description: Não encontrado

  /agents/{id}/abilities:
    get:
      tags: [Agents]
      summary: Listar habilidades de um agente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de habilidades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ability'

  /abilities:
    get:
      tags: [Abilities]
      summary: Listar todas as habilidades
      responses:
        '200':
          description: Lista de habilidades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ability'

    post:
      tags: [Abilities]
      summary: Criar habilidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ability'
      responses:
        '201':
          description: Criada

  /abilities/{id}:
    get:
      tags: [Abilities]
      summary: Buscar habilidade por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Habilidade encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ability'
        '404':
          description: Não encontrada

    put:
      tags: [Abilities]
      summary: Atualizar habilidade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ability'
      responses:
        '200':
          description: Atualizada

    delete:
      tags: [Abilities]
      summary: Deletar habilidade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deletada

components:
  schemas:

    Agent:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    Ability:
      type: object
      required:
        - id
        - agentId
        - name
      properties:
        id:
          type: integer
        agentId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true